[package]
name = "sts-engine"
version = "0.1.0"
edition = "2021"
description = "Fast Rust combat engine for Slay the Spire RL — core turn loop for MCTS simulations"

[lib]
name = "sts_engine"
crate-type = ["cdylib", "rlib"]

[dependencies]
pyo3 = { version = "0.22" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
smallvec = { version = "1", features = ["serde"] }

[dev-dependencies]
criterion = "0.5"
pyo3 = { version = "0.22", features = ["auto-initialize"] }

[features]
default = []
extension-module = ["pyo3/extension-module"]

[[bench]]
name = "combat_bench"
harness = false

[[bench]]
name = "real_world_bench"
harness = false

[[bin]]
name = "trace_replay"
path = "src/bin/trace_replay.rs"

[profile.release]
opt-level = 3
lto = "thin"
