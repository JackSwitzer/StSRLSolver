[package]
name = "sts-engine"
version = "0.1.0"
edition = "2021"
description = "Faithful deterministic Slay the Spire simulation core"

[lib]
name = "sts_engine"
crate-type = ["rlib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
smallvec = { version = "1", features = ["serde"] }

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "combat_bench"
harness = false

[[bench]]
name = "real_world_bench"
harness = false

[[bin]]
name = "trace_replay"
path = "src/bin/trace_replay.rs"

[profile.release]
opt-level = 3
lto = "thin"
