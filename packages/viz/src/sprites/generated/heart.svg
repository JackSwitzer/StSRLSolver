<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff0000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#200000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="70%" stop-color="#880000"/>
      <stop offset="100%" stop-color="#1a0000"/>
    </radialGradient>
  </defs>

  <style>
    @keyframes heartbeat {
      0% { transform: scale(1); }
      15% { transform: scale(1.08); }
      30% { transform: scale(1); }
      45% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    .pulse {
      transform-origin: 70px 70px;
      animation: heartbeat 1.8s ease-in-out infinite;
    }
  </style>

  <!-- Ominous Aura -->
  <circle cx="70" cy="70" r="55" fill="url(#glow)">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite" />
  </circle>

  <g class="pulse">
    <!-- Heart Mass -->
    <path d="M70,115 C35,100 20,75 20,50 C20,30 45,15 65,35 C68,38 70,42 70,42 C70,42 72,38 75,35 C95,15 120,30 120,50 C120,75 105,100 70,115 Z" fill="#120000" stroke="#330000" stroke-width="2"/>
    
    <!-- Veins and Texture -->
    <path d="M40,45 Q30,65 45,90" fill="none" stroke="#4a0000" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M100,45 Q110,65 95,90" fill="none" stroke="#4a0000" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M70,45 L70,100" fill="none" stroke="#4a0000" stroke-width="1.5" opacity="0.4"/>
    
    <!-- Top Arteries/Tendrils -->
    <path d="M55,30 Q45,10 30,15" fill="none" stroke="#0a0000" stroke-width="4" stroke-linecap="round" />
    <path d="M85,30 Q95,10 110,15" fill="none" stroke="#0a0000" stroke-width="4" stroke-linecap="round" />
    <path d="M70,25 V5" fill="none" stroke="#0a0000" stroke-width="5" stroke-linecap="round" />

    <!-- Glowing Core -->
    <circle cx="70" cy="60" r="14" fill="url(#core)" />
    <circle cx="70" cy="60" r="6" fill="#ff8080" opacity="0.5">
       <animate attributeName="r" values="5;7;5" dur="1.8s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
