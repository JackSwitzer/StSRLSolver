<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Body Shadow -->
  <ellipse cx="50" cy="85" rx="35" ry="10" fill="rgba(0,0,0,0.2)" />
  
  <!-- Main Body -->
  <path d="M 15 80 
           Q 10 40 50 15 
           Q 90 40 85 80 
           Q 50 90 15 80 Z" 
        fill="#5D2E2E" stroke="#3A1D1D" stroke-width="2" />
  
  <!-- Back Ridges/Segments -->
  <path d="M 30 25 Q 50 10 70 25" fill="none" stroke="#8B4513" stroke-width="3" stroke-linecap="round" />
  <path d="M 25 40 Q 50 25 75 40" fill="none" stroke="#8B4513" stroke-width="3" stroke-linecap="round" />
  
  <!-- Mouth Interior -->
  <path d="M 25 65 Q 50 85 75 65 Q 50 55 25 65" fill="#2A0B0B" />
  
  <!-- Teeth - Top Row -->
  <path d="M 30 62 L 35 70 L 40 63" fill="#E8E8E8" />
  <path d="M 45 61 L 50 72 L 55 61" fill="#E8E8E8" />
  <path d="M 60 63 L 65 70 L 70 62" fill="#E8E8E8" />
  
  <!-- Teeth - Bottom Row -->
  <path d="M 35 78 L 40 70 L 45 77" fill="#E8E8E8" />
  <path d="M 55 77 L 60 70 L 65 78" fill="#E8E8E8" />
  
  <!-- Menacing Eyes -->
  <ellipse cx="35" cy="45" rx="6" ry="3" fill="#FF4500" transform="rotate(-15 35 45)" />
  <ellipse cx="65" cy="45" rx="6" ry="3" fill="#FF4500" transform="rotate(15 65 45)" />
  
  <!-- Pupils/Glow -->
  <circle cx="35" cy="45" r="2" fill="#FFFF00" />
  <circle cx="65" cy="45" r="2" fill="#FFFF00" />
  
  <!-- Brow Ridges -->
  <path d="M 28 40 Q 35 35 42 42" fill="none" stroke="#3A1D1D" stroke-width="2" />
  <path d="M 58 42 Q 65 35 72 40" fill="none" stroke="#3A1D1D" stroke-width="2" />
</svg>
