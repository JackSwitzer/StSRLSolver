    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite" />
  </ellipse>
  <ellipse cx="60" cy="58" rx="2" ry="3.5" fill="#FFD700" />
  <circle cx="60" cy="57" r="1" fill="#FFFFFF" opacity="0.8" />
